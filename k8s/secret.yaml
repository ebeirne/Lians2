# ─────────────────────────────────────────────────────────────────────────────
# AgentMem sensitive configuration
#
# DO NOT commit this file with real values.  Replace all CHANGE_ME placeholders
# before applying.  For production financial deployments use an external secrets
# manager (AWS Secrets Manager, Azure Key Vault, HashiCorp Vault) and inject via
# the External Secrets Operator rather than storing secrets in this file.
#
# Generate values:
# MASTER_ENCRYPTION_KEY — python -c "import secrets,base64; print(base64.b64encode(secrets.token_bytes(32)).decode())"
# ADMIN_SECRET          — python -c "import secrets; print(secrets.token_urlsafe(32))"
#
# KMS (recommended for production):
# Set KMS_PROVIDER=aws in configmap.yaml and populate KMS_AWS_* below.
# The MASTER_ENCRYPTION_KEY field is then unused.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: agentmem-secret
  namespace: agentmem
  labels:
    app.kubernetes.io/name: agentmem
type: Opaque
stringData:
  # ── Database ────────────────────────────────────────────────────────────────
  # Format: postgresql+asyncpg://<user>:<password>@<host>:<port>/<db>
  DATABASE_URL: "postgresql+asyncpg://agentmem:CHANGE_ME@postgres.agentmem.svc.cluster.local:5432/agentmem"

  # ── Redis ───────────────────────────────────────────────────────────────────
  REDIS_URL: "redis://:CHANGE_ME@redis.agentmem.svc.cluster.local:6379/0"

  # ── Master encryption key (AES-256) ─────────────────────────────────────────
  # Used by KMS_PROVIDER=env.  For KMS_PROVIDER=aws/azure/vault this is ignored
  # and the key is fetched from the KMS at startup.
  MASTER_ENCRYPTION_KEY: "CHANGE_ME_base64_32_bytes"

  # ── Admin API secret ─────────────────────────────────────────────────────────
  # Protects all /v1/admin/* endpoints.  Treat like a root password.
  ADMIN_SECRET: "CHANGE_ME_admin_secret"

  # ── Embedding provider ───────────────────────────────────────────────────────
  VOYAGE_API_KEY: ""        # Required when EMBEDDING_PROVIDER=voyage
  OPENAI_API_KEY: ""        # Required when EMBEDDING_PROVIDER=openai

  # ── LLM adjudication ─────────────────────────────────────────────────────────
  ANTHROPIC_API_KEY: ""     # Required when SUPERSESSION_LLM_STAGE=true

  # ── Stripe usage metering ────────────────────────────────────────────────────
  STRIPE_API_KEY: ""        # sk_live_... — leave blank to disable metering

  # ── AWS KMS (used when KMS_PROVIDER=aws) ─────────────────────────────────────
  KMS_AWS_REGION: "us-east-1"
  KMS_AWS_ENCRYPTED_KEY: ""    # base64 CiphertextBlob from aws kms generate-data-key
  KMS_AWS_KEY_ID: ""           # CMK ARN (optional — inferred from CiphertextBlob)

  # ── Azure Key Vault (used when KMS_PROVIDER=azure) ───────────────────────────
  KMS_AZURE_VAULT_URL: ""             # https://myvault.vault.azure.net/
  KMS_AZURE_SECRET_NAME: "agentmem-master-key"

  # ── HashiCorp Vault (used when KMS_PROVIDER=vault) ───────────────────────────
  KMS_VAULT_ADDR: ""         # http://vault.vault.svc.cluster.local:8200
  KMS_VAULT_TOKEN: ""
  KMS_VAULT_PATH: "agentmem/master-key"
  KMS_VAULT_MOUNT_POINT: "secret"
