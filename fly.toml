app            = 'agentmem-lotus'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = 'stop'
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ['app']

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 200
    soft_limit = 150

[env]
  EMBEDDING_PROVIDER            = "local"
  SUPERSESSION_LLM_STAGE        = "false"
  RECALL_CACHE_ENABLED          = "true"
  RECALL_CACHE_TTL_SECONDS      = "60"
  SUPERSESSION_REVIEW_THRESHOLD = "0.75"
  OTEL_SERVICE_NAME             = "agentmem"
  LOG_JSON                      = "true"
  LOG_LEVEL                     = "INFO"
  RATE_LIMIT_PER_MINUTE         = "300"
  CORS_ORIGINS                  = "*"
  AIRGAP_MODE                   = "false"
  RETENTION_PRUNE_INTERVAL_HOURS = "24"

[[vm]]
  cpu_kind  = 'shared'
  cpus      = 1
  memory    = '1gb'
  memory_mb = 1024
