services:
  - type: web
    name: agentmem-api
    runtime: python
    plan: standard
    region: oregon
    branch: master
    buildCommand: pip install -e ".[otel]"
    # Render provides a bare postgresql:// URL, but the app's parse_db_url()
    # expects postgresql+asyncpg:// (SQLAlchemy async). Rewrite the scheme in
    # both the migration and start commands. Migrations run here (preDeploy),
    # from inside agentmem/ because alembic.ini uses relative paths.
    preDeployCommand: export DATABASE_URL=$(echo "$DATABASE_URL" | sed 's#postgresql://#postgresql+asyncpg://#') && export PYTHONPATH=$PWD/agentmem/src && cd agentmem && alembic -c alembic.ini upgrade head
    startCommand: export DATABASE_URL=$(echo "$DATABASE_URL" | sed 's#postgresql://#postgresql+asyncpg://#') && uvicorn lians.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentmem-pg
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: agentmem-redis
          type: redis
          property: connectionString
      # local = hash-projection embeddings, no external API key required.
      # Switch to "voyage" only if you also set VOYAGE_API_KEY (sync:false).
      - key: EMBEDDING_PROVIDER
        value: local
      - key: MASTER_ENCRYPTION_KEY
        generateValue: true  # base64 256-bit — decodes to 32 bytes; pinned forever
      - key: ADMIN_SECRET
        sync: false          # set this = the website's LIANS_ADMIN_SECRET
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPERSESSION_LLM_STAGE
        value: "true"
      - key: RECALL_CACHE_ENABLED
        value: "true"
      - key: RECALL_CACHE_TTL_SECONDS
        value: "60"
      - key: SUPERSESSION_REVIEW_THRESHOLD
        value: "0.75"
      - key: OTEL_SERVICE_NAME
        value: agentmem
      - key: PYTHONPATH
        value: agentmem/src

  # Redis is a service (type: redis), not a database entry.
  - type: redis
    name: agentmem-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru

databases:
  # Postgres plan slugs are basic-256mb / basic-1gb / pro-* — NOT "standard".
  - name: agentmem-pg
    plan: basic-256mb
    region: oregon
    databaseName: agentmem
    user: agentmem
