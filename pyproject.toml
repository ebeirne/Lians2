[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lians"
version = "0.1.0"
description = "Lians — financial-grade agent memory with bitemporal model, audit chain, and compliance stack"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.2.0",
    "redis[hiredis]>=5.0.0",
    "cryptography>=42.0.0",
    "voyageai>=0.2.3",
    "openai>=1.30.0",
    "anthropic>=0.103.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
    "pgvector>=0.3.0",
    "numpy>=1.26.0",
]

[project.optional-dependencies]
# Self-hosted embeddings â€” no external API calls, suitable for air-gapped deployments.
# Default model BAAI/bge-large-en-v1.5 requires ~1.3 GB disk; downloaded on first use.
# For fully offline use, pre-download the model and set SENTENCE_TRANSFORMER_MODEL=/path.
local = [
    "sentence-transformers>=3.0.0",
]
langchain = ["langchain-core>=0.2.0"]
mcp = ["mcp>=1.0.0", "httpx>=0.27.0"]
billing = ["stripe>=7.0.0"]
otel = [
    "opentelemetry-api>=1.24.0",
    "opentelemetry-sdk>=1.24.0",
    "opentelemetry-instrumentation-fastapi>=0.45b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.45b0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.24.0",
]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "aiosqlite>=0.20.0",
    "httpx>=0.27.0",
]

[tool.hatch.build.targets.wheel]
packages = ["agentmem/src/lians"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["agentmem/tests"]
pythonpath = ["agentmem"]

[tool.ruff]
line-length = 100
